<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Tracker</title>
</head>
<body style="font-family: Arial; padding:40px; background:#111; color:white;">

<h1>🔥 Pokemon East Bay Tracker</h1>

<input id="search" placeholder="Search product..." style="padding:10px; width:250px;">
<button onclick="loadData()">Search</button>

<h2>Products</h2>
<div id="products"></div>

<h2>Stores (East Bay)</h2>
<div id="stores"></div>

<script>

async function loadData() {
  const search = document.getElementById("search").value.toLowerCase();

  const products = await fetch("data/products.json").then(res => res.json());
  const stores = await fetch("data/stores.json").then(res => res.json());

  // FILTER PRODUCTS
  const filteredProducts = products.filter(p =>
    p.name.toLowerCase().includes(search)
  );

  // SHOW PRODUCTS
  const productDiv = document.getElementById("products");
  productDiv.innerHTML = "";

  filteredProducts.forEach(p => {
    const el = document.createElement("div");
    el.style.marginBottom = "10px";
    el.innerHTML = `
      <strong>${p.name}</strong><br>
      Keywords: ${p.keywords.join(", ")}<br>
      Status: ⚠️ Checking...
    `;
    productDiv.appendChild(el);
  });

  // SHOW STORES
  const storeDiv = document.getElementById("stores");
  storeDiv.innerHTML = "";

  stores.forEach(s => {
    const el = document.createElement("div");
    el.style.marginBottom = "10px";
    el.innerHTML = `
      ${s.name} (${s.city})<br>
      ${s.address}
    `;
    storeDiv.appendChild(el);
  });
}

</script>

</body>
</html>
